# avd-repo6
# want to store code for project cicd practical
name: etl pipeline
on:
  push:
    branches:
      - main
jobs:
  extract-data-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # v2 is deprecated, use v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run extract_data.py
        run: python extract_data.py   # works after setup-python step
  transform-data-job:
    runs-on: ubuntu-latest
    needs: extract-data-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run transform_data.py
        run: python transform_data.py
  load-data-job:
    runs-on: ubuntu-latest
    needs: transform-data-job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run load_data.py
        run: python load_data.py

